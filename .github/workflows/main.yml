# 存储路径: .github/workflows/main.yml
name: Tickeron Pro AI Bot

on:
  schedule:
    - cron: '*/30 * * * 1-5'
    - cron: '15 * * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      run_mode:
        description: '选择要手动执行的策略模式'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - sentinel
          - matrix
          - daily

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # [关键新增] 必须赋予 GitHub Actions 写入权限，否则无法自动提交文件
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装量化组件
        # 注意这里新增了 lxml，它是 pd.read_html 解析网页必备的库
        run: |
          pip install yfinance requests pandas lxml

      - name: 智能路由与执行
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MODE="sentinel"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ github.event.inputs.run_mode }}"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "0 22 * * 1-5" ]]; then
              MODE="daily"
            elif [[ "${{ github.event.schedule }}" == "15 * * * 1-5" ]]; then
              MODE="matrix"
            else
              MODE="sentinel"
            fi
          fi
          echo "准备以 [$MODE] 模式运行 AI 引擎..."
          # 统一使用 quantbot.py 作为入口文件
          python quantbot.py $MODE

      # [新增] 自动提交回测日志到仓库，且缩进已完美对齐
      - name: 自动提交回测日志
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📝 自动记录今日回测日志"
          file_pattern: backtest_log.jsonl
