# 存储路径: .github/workflows/main.yml
name: Tickeron Pro AI Bot

on:
  schedule:
    - cron: '*/30 * * * 1-5'
    - cron: '15 * * * 1-5'
    - cron: '0 22 * * 1-5'
    - cron: '0 23 * * 5'  # 每周五 23:00 UTC 自动执行回测
  workflow_dispatch:
    inputs:
      run_mode:
        description: '选择执行模式'
        required: true
        default: 'sentinel'
        type: choice
        options:
          - sentinel
          - matrix
          - daily
          - backtest

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装量化组件
        run: |
          pip install yfinance requests pandas lxml

      - name: 智能路由与执行
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MODE="sentinel"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ github.event.inputs.run_mode }}"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "0 22 * * 1-5" ]]; then
              MODE="daily"
            elif [[ "${{ github.event.schedule }}" == "15 * * * 1-5" ]]; then
              MODE="matrix"
            elif [[ "${{ github.event.schedule }}" == "0 23 * * 5" ]]; then
              MODE="backtest"
            else
              MODE="sentinel"
            fi
          fi
          
          # 对齐你的文件名：monitor.py 和 backtesterbot.py
          if [[ "$MODE" == "backtest" ]]; then
            echo ">>> 启动回测引擎 [backtesterbot.py]..."
            python backtesterbot.py
          else
            echo ">>> 启动监控引擎 [monitor.py] | 模式: $MODE"
            python monitor.py $MODE
          fi

      - name: 自动提交回测日志与战报
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📝 自动同步回测数据与战报"
          file_pattern: "backtest_log.jsonl backtest_report.md strategy_stats.json"
